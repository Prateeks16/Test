<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OTP Extractor</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #6366f1;
      --accent-2: #8b5cf6;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --ok: #22c55e;
      --err: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #1e293b 0%, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }
    .title {
      font-size: 26px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
    .drop {
      border: 2px dashed rgba(148, 163, 184, 0.35);
      border-radius: 16px;
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: rgba(15, 23, 42, 0.4);
    }
    .drop:hover, .drop.drag { border-color: var(--accent); background: rgba(99, 102, 241, 0.08); }
    .drop .icon { font-size: 40px; margin-bottom: 10px; }
    .drop .hint { color: var(--muted); font-size: 13px; margin-top: 4px; }
    input[type=file] { display: none; }
    .preview {
      margin-top: 20px;
      display: none;
      text-align: center;
    }
    .preview img {
      max-width: 100%;
      max-height: 260px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    .preview .fname { color: var(--muted); font-size: 13px; margin-top: 8px; }
    .btn {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.2s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .result {
      margin-top: 24px;
      display: none;
      text-align: center;
      padding: 24px;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.15);
    }
    .result .label { color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
    .result .otp {
      font-size: 44px;
      font-weight: 800;
      letter-spacing: 8px;
      margin: 12px 0;
      font-variant-numeric: tabular-nums;
      color: var(--ok);
    }
    .result.error .otp { color: var(--err); font-size: 18px; letter-spacing: 0; font-weight: 600; }
    .copy {
      margin-top: 8px;
      padding: 8px 18px;
      font-size: 13px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
    }
    .copy:hover { border-color: var(--accent); }
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">OTP Extractor</div>
    <div class="subtitle">Upload an OTP image or PDF — the code is read automatically.</div>

    <label class="drop" id="drop">
      <div class="icon">📩</div>
      <div><strong>Drop image / PDF here</strong> or click to browse</div>
      <div class="hint">PNG, JPG or PDF · up to 16 MB</div>
      <input type="file" id="file" accept="image/*,.pdf" />
    </label>

    <div class="preview" id="preview">
      <img id="previewImg" alt="preview" />
      <div class="fname" id="fname"></div>
    </div>

    <button class="btn" id="extractBtn" disabled>Extract OTP</button>

    <div class="result" id="result">
      <div class="label" id="resultLabel">Detected OTP</div>
      <div class="otp" id="otp"></div>
      <button class="copy" id="copyBtn">Copy</button>
    </div>
  </div>

  <script>
    const drop = document.getElementById('drop');
    const fileInput = document.getElementById('file');
    const preview = document.getElementById('preview');
    const previewImg = document.getElementById('previewImg');
    const fname = document.getElementById('fname');
    const extractBtn = document.getElementById('extractBtn');
    const result = document.getElementById('result');
    const resultLabel = document.getElementById('resultLabel');
    const otpEl = document.getElementById('otp');
    const copyBtn = document.getElementById('copyBtn');
    let selectedFile = null;

    function setFile(file) {
      selectedFile = file;
      result.style.display = 'none';
      fname.textContent = file.name;
      if (file.type.startsWith('image/')) {
        const url = URL.createObjectURL(file);
        previewImg.src = url;
        previewImg.style.display = 'block';
      } else {
        previewImg.style.display = 'none';
      }
      preview.style.display = 'block';
      extractBtn.disabled = false;
    }

    drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
    drop.addEventListener('drop', e => {
      e.preventDefault();
      drop.classList.remove('drag');
      if (e.dataTransfer.files.length) { fileInput.files = e.dataTransfer.files; setFile(e.dataTransfer.files[0]); }
    });
    fileInput.addEventListener('change', () => { if (fileInput.files.length) setFile(fileInput.files[0]); });

    extractBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      extractBtn.disabled = true;
      extractBtn.innerHTML = '<span class="spinner"></span> Extracting…';
      result.style.display = 'none';

      const fd = new FormData();
      fd.append('file', selectedFile);
      try {
        const res = await fetch('/extract', { method: 'POST', body: fd });
        const data = await res.json();
        if (res.ok) {
          result.classList.remove('error');
          resultLabel.textContent = 'Detected OTP';
          otpEl.textContent = data.otp;
          copyBtn.style.display = 'inline-block';
        } else {
          result.classList.add('error');
          resultLabel.textContent = 'Error';
          otpEl.textContent = data.error || 'Something went wrong';
          copyBtn.style.display = 'none';
        }
      } catch (err) {
        result.classList.add('error');
        resultLabel.textContent = 'Error';
        otpEl.textContent = 'Request failed';
        copyBtn.style.display = 'none';
      }
      result.style.display = 'block';
      extractBtn.disabled = false;
      extractBtn.textContent = 'Extract OTP';
    });

    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(otpEl.textContent);
      copyBtn.textContent = 'Copied!';
      setTimeout(() => copyBtn.textContent = 'Copy', 1500);
    });
  </script>
</body>
</html>
